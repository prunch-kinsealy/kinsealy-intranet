<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to the Staff Hub — Kinsealy Medical Centre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2d4a;--navy-light:#243c61;--teal:#2a8a7e;--teal-light:#3aa897;--teal-pale:#e8f5f3;
  --gold:#c9a84c;--cream:#f8f6f1;--white:#fff;--grey-100:#f4f4f4;--grey-200:#e8e8e8;
  --grey-400:#9ca3af;--grey-700:#374151;--text:#1f2937;--radius:12px;
  --red:#dc2626;--amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text)}

.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.ob-card{background:#fff;border-radius:20px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.35)}

/* ── HEADER ── */
.ob-header{background:var(--navy);padding:18px 28px;display:flex;align-items:center;justify-content:space-between}
.ob-header-left{display:flex;align-items:center;gap:12px}
.ob-logo{height:32px;filter:brightness(0) invert(1);opacity:.9}
.ob-header-title{color:rgba(255,255,255,0.55);font-size:0.75rem;font-weight:500}
.ob-version{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-size:0.65rem;padding:3px 8px;border-radius:20px;font-weight:600;letter-spacing:0.05em}

/* ── BETA BADGE ── */
.beta-badge{display:inline-flex;align-items:center;gap:5px;background:#fef3c7;border:1px solid #f59e0b;color:#92400e;font-size:0.7rem;font-weight:700;padding:3px 10px;border-radius:20px;letter-spacing:0.06em}
.beta-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── PROGRESS ── */
.ob-progress-wrap{height:4px;background:var(--grey-200)}
.ob-progress-fill{height:4px;background:var(--teal);transition:width .4s ease}

/* ── BODY ── */
.ob-body{padding:36px 40px 28px}
@media(max-width:540px){.ob-body{padding:24px 20px 20px}}

.ob-step-icon{font-size:2.6rem;margin-bottom:14px;line-height:1}
.ob-step-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal);margin-bottom:7px}
.ob-title{font-family:'DM Serif Display',serif;font-size:1.7rem;color:var(--navy);line-height:1.2;margin-bottom:12px}
.ob-desc{font-size:0.88rem;color:var(--grey-700);line-height:1.75;margin-bottom:18px}
.ob-desc strong{color:var(--navy)}
.ob-desc ul{margin:10px 0 0 18px}
.ob-desc ul li{margin-bottom:5px}

/* ── ROLE GRID ── */
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:6px}
@media(max-width:480px){.role-grid{grid-template-columns:1fr 1fr}}
.role-btn{border:2px solid var(--grey-200);border-radius:10px;padding:14px 8px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;font-family:'DM Sans',sans-serif}
.role-btn:hover{border-color:var(--teal);background:var(--teal-pale)}
.role-btn.selected{border-color:var(--teal);background:var(--teal);color:#fff}
.role-btn .role-icon{font-size:1.7rem;display:block;margin-bottom:5px}
.role-btn .role-label{font-size:0.76rem;font-weight:600}

/* ── CALLOUT BOXES ── */
.ob-highlight{display:flex;gap:12px;background:var(--teal-pale);border:1px solid var(--teal);border-radius:10px;padding:12px 14px;margin-bottom:14px;align-items:flex-start}
.ob-highlight-icon{font-size:1.3rem;flex-shrink:0;margin-top:2px}
.ob-highlight-text{font-size:0.82rem;color:var(--navy);line-height:1.6}
.ob-highlight-text strong{display:block;margin-bottom:2px;font-size:0.84rem}

.ob-tip{display:flex;gap:10px;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:11px 13px;margin-bottom:14px;font-size:0.81rem;color:#92400e;line-height:1.6;align-items:flex-start}

/* ── FEEDBACK CALLOUT (special) ── */
.ob-feedback-cta{background:linear-gradient(135deg,#1a2d4a,#1a3a5c);border-radius:12px;padding:20px;color:#fff;margin-bottom:14px}
.ob-feedback-cta h4{font-family:'DM Serif Display',serif;font-size:1.15rem;margin-bottom:8px}
.ob-feedback-cta p{font-size:0.82rem;color:rgba(255,255,255,0.75);line-height:1.65}
.ob-feedback-cta .feedback-btn{display:inline-flex;align-items:center;gap:7px;background:var(--gold);color:var(--navy);font-size:0.8rem;font-weight:700;padding:8px 16px;border-radius:8px;margin-top:14px;text-decoration:none;border:none;cursor:pointer;font-family:'DM Sans',sans-serif}

/* ── LINK BUTTONS ── */
.ob-link-btn{display:inline-flex;align-items:center;gap:7px;background:var(--navy);color:#fff;font-size:0.81rem;font-weight:600;padding:8px 15px;border-radius:8px;text-decoration:none;margin-bottom:6px;margin-right:6px;transition:background .15s}
.ob-link-btn:hover{background:var(--teal)}

/* ── FOOTER ── */
.ob-footer{padding:18px 40px 24px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--grey-200)}
@media(max-width:540px){.ob-footer{padding:14px 20px 20px}}
.ob-step-count{font-size:0.73rem;color:var(--grey-400)}
.ob-nav{display:flex;gap:8px}
.ob-btn{padding:10px 22px;border-radius:8px;font-size:0.86rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.ob-btn-ghost{background:var(--grey-100);color:var(--grey-700)}
.ob-btn-ghost:hover{background:var(--grey-200)}
.ob-btn-primary{background:var(--teal);color:#fff}
.ob-btn-primary:hover{background:var(--teal-light)}
.ob-btn-primary:disabled{opacity:.4;cursor:not-allowed}
.ob-btn-finish{background:var(--gold);color:var(--navy)}
.ob-btn-finish:hover{filter:brightness(1.05)}

/* ── WELCOME HERO ── */
.ob-welcome-hero{background:linear-gradient(135deg,var(--navy),#1a3a5c);border-radius:14px;padding:28px;text-align:center;margin-bottom:20px;color:#fff}
.ob-welcome-hero h1{font-family:'DM Serif Display',serif;font-size:1.9rem;margin-bottom:6px}
.ob-welcome-hero p{color:rgba(255,255,255,0.7);font-size:0.87rem;line-height:1.6;margin-top:8px}
.ob-welcome-name{color:var(--gold)}

/* ── LEGAL SCREEN ── */
.ob-legal-box{background:var(--grey-100);border:1px solid var(--grey-200);border-radius:10px;padding:18px 20px;max-height:240px;overflow-y:auto;margin-bottom:16px;font-size:0.8rem;color:var(--grey-700);line-height:1.75}
.ob-legal-box h4{font-size:0.85rem;font-weight:700;color:var(--navy);margin-bottom:10px}
.ob-legal-box ol{margin-left:18px}
.ob-legal-box ol li{margin-bottom:7px}
.ob-legal-accept{display:flex;gap:12px;align-items:flex-start;background:#fff;border:2px solid var(--grey-200);border-radius:10px;padding:14px;margin-bottom:16px;cursor:pointer;transition:border-color .15s}
.ob-legal-accept:hover{border-color:var(--teal)}
.ob-legal-accept.checked{border-color:var(--teal);background:var(--teal-pale)}
.ob-legal-accept input[type=checkbox]{width:18px;height:18px;flex-shrink:0;margin-top:1px;accent-color:var(--teal);cursor:pointer}
.ob-legal-accept label{font-size:0.83rem;color:var(--grey-700);cursor:pointer;line-height:1.55}
.ob-legal-accept label strong{color:var(--navy)}
.ob-sig-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
@media(max-width:480px){.ob-sig-row{grid-template-columns:1fr}}
.ob-sig-field label{display:block;font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--grey-400);margin-bottom:4px}
.ob-sig-field input{width:100%;border:1px solid var(--grey-200);border-radius:8px;padding:9px 11px;font-size:0.84rem;font-family:'DM Sans',sans-serif;color:var(--navy);background:#f9f9f9}
.ob-sig-field input[readonly]{color:var(--grey-400)}

/* ── FINISH SCREEN ── */
.ob-finish-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
@media(max-width:480px){.ob-finish-grid{grid-template-columns:1fr}}
.ob-finish-link{display:flex;align-items:center;gap:10px;background:var(--grey-100);border:1px solid var(--grey-200);border-radius:10px;padding:11px 13px;text-decoration:none;color:var(--navy);font-size:0.81rem;font-weight:600;transition:border-color .15s}
.ob-finish-link:hover{border-color:var(--teal);background:var(--teal-pale)}
.ob-finish-link-icon{font-size:1.3rem;flex-shrink:0}
</style>
</head>

<div class="ob-wrap">

    <div class="ob-header">
      <div class="ob-header-left">

<script>
const display  = sessionStorage.getItem('kmc-display') || '';
const username = sessionStorage.getItem('kmc-user') || '';

// First-name lookup — display names are "Dr O'Reilly" format (surname only)

  fran:'Fran', joanne:'Joanne', ciara:'Ciara', ruth:'Ruth', eimear:'Eimear',
  laura:'Laura', maria:'Maria', susan:'Susan', michaela:'Michaela',
  holly:'Holly', edel:'Edel', amy:'Amy'
};
const firstName = FIRST_NAMES[username] || display.split(' ').slice(-1)[0] || 'there';
const fullName  = display || firstName;

const TODAY = new Date().toLocaleDateString('en-IE',{day:'numeric',month:'long',year:'numeric'});

// ── ROLE DEFINITIONS ──────────────────────────────────────────

  secretary:    { label:'Secretary',        icon:'📋' },
  pm:           { label:'Practice Manager', icon:'⚙️' }
};

           <p style="margin-top:10px">It's the fastest way to navigate the hub once you know what you're looking for.</p>`,

// ── STATE ─────────────────────────────────────────────────────
let currentRoles = new Set();
let steps = [];
let stepIndex = 0;
let phase = 'legal'; // legal → role → steps

function buildCombinedSteps(roleKeys) {
  const common_feedback_key = 'feedback';
  let combined = [];
  const seenTitles = new Set();
  let feedbackStep = null;

  roleKeys.forEach(key => {
    const roleSteps = getSteps(key);
    roleSteps.forEach(s => {
      if (s.feedbackCta) { feedbackStep = s; return; } // collect once
      if (!seenTitles.has(s.title)) {
        seenTitles.add(s.title);
        combined.push(s);
      }
    });
  });

  if (feedbackStep) combined.push(feedbackStep);
  return combined;
}

    steps = buildCombinedSteps([...currentRoles]);
    stepIndex = 0;
    phase = 'steps';

  if (currentRoles.size > 0) {
    setTimeout(() => currentRoles.forEach(k => document.getElementById('role-' + k)?.classList.add('selected')), 10);

function selectRole(key) {
  if (currentRoles.has(key)) {
    currentRoles.delete(key);
    document.getElementById('role-' + key).classList.remove('selected');
  } else {
    currentRoles.add(key);
    document.getElementById('role-' + key).classList.add('selected');
  }
}

// ── STEP RENDERER ─────────────────────────────────────────────
function renderStep() {
  const step = steps[stepIndex];
  const total = steps.length;
  const pct = 66 + Math.round((stepIndex + 1) / total * 34);

  document.getElementById('ob-progress').style.width = pct + '%';
  document.getElementById('ob-step-count').textContent = `Step ${stepIndex + 1} of ${total}`;

  const backBtn = document.getElementById('ob-back');
  backBtn.style.display = 'inline-flex';
  backBtn.onclick = () => {
    if (stepIndex === 0) { renderRolePicker(); } else { obNav(-1); }
  };

  const isLast = stepIndex === total - 1;
  const nextBtn = document.getElementById('ob-next');
  nextBtn.textContent = isLast ? 'Finish ✓' : 'Next →';
  nextBtn.className = isLast ? 'ob-btn ob-btn-finish' : 'ob-btn ob-btn-primary';
  nextBtn.disabled = false;
  nextBtn.onclick = isLast ? finishTour : () => obNav(1);

  const highlightHtml = step.highlight ? `

  const tipHtml = step.tip ? `
