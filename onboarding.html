<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to the Staff Hub — Kinsealy Medical Centre</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1a2d4a;--navy-light:#243c61;--teal:#2a8a7e;--teal-light:#3aa897;--teal-pale:#e8f5f3;
  --gold:#c9a84c;--cream:#f8f6f1;--white:#fff;--grey-100:#f4f4f4;--grey-200:#e8e8e8;
  --grey-400:#9ca3af;--grey-700:#374151;--text:#1f2937;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--text)}

/* ── LAYOUT ── */
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}

/* ── CARD ── */
.ob-card{background:#fff;border-radius:20px;width:100%;max-width:680px;overflow:hidden;box-shadow:0 24px 80px rgba(0,0,0,0.35)}

/* ── HEADER BAR ── */
.ob-header{background:var(--navy);padding:22px 32px;display:flex;align-items:center;gap:14px}
.ob-logo{height:36px;filter:brightness(0) invert(1);opacity:.9}
.ob-header-title{color:rgba(255,255,255,0.6);font-size:0.8rem;font-weight:500}

/* ── PROGRESS ── */
.ob-progress-wrap{height:4px;background:var(--grey-200)}
.ob-progress-fill{height:4px;background:var(--teal);transition:width .4s ease}

/* ── BODY ── */
.ob-body{padding:40px 40px 32px}
@media(max-width:540px){.ob-body{padding:28px 22px 24px}}

/* ── STEP ICON ── */
.ob-step-icon{font-size:3rem;margin-bottom:16px;line-height:1}

/* ── TYPOGRAPHY ── */
.ob-step-label{font-size:0.7rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--teal);margin-bottom:8px}
.ob-title{font-family:'DM Serif Display',serif;font-size:1.8rem;color:var(--navy);line-height:1.2;margin-bottom:14px}
.ob-desc{font-size:0.9rem;color:var(--grey-700);line-height:1.75;margin-bottom:20px}
.ob-desc strong{color:var(--navy)}
.ob-desc ul{margin:10px 0 0 18px}
.ob-desc ul li{margin-bottom:6px}

/* ── ROLE GRID ── */
.role-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:8px}
@media(max-width:480px){.role-grid{grid-template-columns:1fr 1fr}}
.role-btn{border:2px solid var(--grey-200);border-radius:10px;padding:16px 10px;text-align:center;cursor:pointer;background:#fff;transition:all .15s;font-family:'DM Sans',sans-serif}
.role-btn:hover{border-color:var(--teal);background:var(--teal-pale)}
.role-btn.selected{border-color:var(--teal);background:var(--teal);color:#fff}
.role-btn .role-icon{font-size:1.8rem;display:block;margin-bottom:6px}
.role-btn .role-label{font-size:0.78rem;font-weight:600}

/* ── HIGHLIGHT BOXES ── */
.ob-highlight{display:flex;gap:14px;background:var(--teal-pale);border:1px solid var(--teal);border-radius:10px;padding:14px 16px;margin-bottom:16px;align-items:flex-start}
.ob-highlight-icon{font-size:1.4rem;flex-shrink:0;margin-top:2px}
.ob-highlight-text{font-size:0.83rem;color:var(--navy);line-height:1.65}
.ob-highlight-text strong{display:block;margin-bottom:3px;font-size:0.85rem}

.ob-tip{display:flex;gap:12px;background:#fffbeb;border:1px solid #fcd34d;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:0.82rem;color:#92400e;line-height:1.6;align-items:flex-start}
.ob-tip-icon{flex-shrink:0;font-size:1.1rem}

/* ── LINK BUTTON ── */
.ob-link-btn{display:inline-flex;align-items:center;gap:8px;background:var(--navy);color:#fff;font-size:0.82rem;font-weight:600;padding:9px 16px;border-radius:8px;text-decoration:none;margin-bottom:6px;margin-right:6px;transition:background .15s}
.ob-link-btn:hover{background:var(--teal)}
.ob-link-btn.secondary{background:var(--grey-100);color:var(--navy)}
.ob-link-btn.secondary:hover{background:var(--grey-200)}

/* ── FOOTER / NAV ── */
.ob-footer{padding:20px 40px 28px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--grey-200)}
@media(max-width:540px){.ob-footer{padding:16px 22px 22px}}
.ob-step-count{font-size:0.75rem;color:var(--grey-400)}
.ob-nav{display:flex;gap:10px}
.ob-btn{padding:10px 22px;border-radius:8px;font-size:0.88rem;font-weight:600;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;transition:all .15s}
.ob-btn-ghost{background:var(--grey-100);color:var(--grey-700)}
.ob-btn-ghost:hover{background:var(--grey-200)}
.ob-btn-primary{background:var(--teal);color:#fff}
.ob-btn-primary:hover{background:var(--teal-light)}
.ob-btn-primary:disabled{opacity:.4;cursor:not-allowed}
.ob-btn-finish{background:var(--gold);color:var(--navy)}
.ob-btn-finish:hover{background:#d4a84c}

/* ── WELCOME / FINISH SCREENS ── */
.ob-welcome-hero{background:linear-gradient(135deg,var(--navy),#1a3a5c);border-radius:16px;padding:32px;text-align:center;margin-bottom:24px;color:#fff}
.ob-welcome-hero h1{font-family:'DM Serif Display',serif;font-size:2rem;margin-bottom:8px}
.ob-welcome-hero p{color:rgba(255,255,255,0.7);font-size:0.9rem;line-height:1.6}
.ob-welcome-name{color:var(--gold);font-family:'DM Serif Display',serif}

.ob-finish-icon{font-size:4rem;text-align:center;margin-bottom:16px}
.ob-finish-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:480px){.ob-finish-grid{grid-template-columns:1fr}}
.ob-finish-link{display:flex;align-items:center;gap:10px;background:var(--grey-100);border:1px solid var(--grey-200);border-radius:10px;padding:12px 14px;text-decoration:none;color:var(--navy);font-size:0.82rem;font-weight:600;transition:border-color .15s}
.ob-finish-link:hover{border-color:var(--teal);background:var(--teal-pale)}
.ob-finish-link-icon{font-size:1.4rem;flex-shrink:0}
</style>
</head>

  const map = { doctor: steps_doctor, nurse: steps_nurse, phlebotomist: steps_phlebotomist, secretary: steps_secretary, pm: steps_pm };
  return map[roleKey] || steps_secretary;
}

// ── STATE ─────────────────────────────────────────────────────
let currentRole = null;
let steps = [];
let stepIndex = 0;

// ── SCREENS ──────────────────────────────────────────────────
function renderRolePicker() {
  document.getElementById('ob-progress').style.width = '0%';
  document.getElementById('ob-step-count').textContent = '';
  document.getElementById('ob-back').style.display = 'none';
  document.getElementById('ob-next').textContent = 'Next →';
  document.getElementById('ob-next').className = 'ob-btn ob-btn-primary';
  document.getElementById('ob-next').onclick = () => {
    if (!currentRole) { alert('Please select your role to continue.'); return; }
    steps = getSteps(currentRole);
    stepIndex = 0;
    renderStep();
  };

  document.getElementById('ob-screens').innerHTML = `
    <div class="ob-body">
      <div class="ob-welcome-hero">
        <div style="font-size:2.5rem;margin-bottom:12px">👋</div>
        <h1>Welcome, <span class="ob-welcome-name">${firstName}.</span></h1>
        <p>Let's get you up to speed with the Kinsealy Staff Hub.<br>First — what's your role?</p>
      </div>
      <div class="role-grid">
        ${Object.entries(ROLES).map(([key, r]) => `
          <button class="role-btn" id="role-${key}" onclick="selectRole('${key}')">
            <span class="role-icon">${r.icon}</span>
            <span class="role-label">${r.label}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `;
}

function selectRole(key) {
  currentRole = key;
  document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('role-' + key).classList.add('selected');
}

function renderStep() {
  const step = steps[stepIndex];
  const total = steps.length;
  const pct = Math.round((stepIndex + 1) / total * 100);

  document.getElementById('ob-progress').style.width = pct + '%';
  document.getElementById('ob-step-count').textContent = `Step ${stepIndex + 1} of ${total}`;
  document.getElementById('ob-back').style.display = stepIndex > 0 ? 'inline-flex' : 'none';

  const isLast = stepIndex === total - 1;
  const nextBtn = document.getElementById('ob-next');
  nextBtn.textContent = isLast ? 'Finish tour ✓' : 'Next →';
  nextBtn.className = isLast ? 'ob-btn ob-btn-finish' : 'ob-btn ob-btn-primary';
  nextBtn.onclick = isLast ? finishTour : () => obNav(1);

  const highlightHtml = step.highlight ? `
    <div class="ob-highlight">
      <div class="ob-highlight-icon">${step.highlight.icon}</div>
      <div class="ob-highlight-text"><strong>${step.highlight.title}</strong>${step.highlight.text}</div>
    </div>` : '';

  const tipHtml = step.tip ? `
    <div class="ob-tip"><span class="ob-tip-icon">💡</span><span>${step.tip.text}</span></div>` : '';

  const linkHtml = step.link ? `
    <a class="ob-link-btn" href="${step.link.href}"${step.link.section ? ` onclick="sessionStorage.setItem('kmc-pending-section','${step.link.section}')"` : ''} target="${step.link.href.startsWith('index') ? '_blank' : '_blank'}">
      ${step.link.label} ↗
    </a>` : '';

  document.getElementById('ob-screens').innerHTML = `
    <div class="ob-body">
      <div class="ob-step-icon">${step.icon}</div>
      <div class="ob-step-label">${step.label}</div>
      <h2 class="ob-title">${step.title}</h2>
      <div class="ob-desc">${step.desc}</div>
      ${highlightHtml}
      ${tipHtml}
      ${linkHtml}
    </div>
  `;
}

function finishTour() {
  localStorage.setItem('kmc-onboarded-' + username, '1');
  document.getElementById('ob-progress').style.width = '100%';
  document.getElementById('ob-step-count').textContent = 'All done!';
  document.getElementById('ob-back').style.display = 'none';
  document.getElementById('ob-next').style.display = 'none';

  const roleInfo = ROLES[currentRole] || { icon: '👋', label: 'Staff' };

  document.getElementById('ob-screens').innerHTML = `
    <div class="ob-body">
      <div class="ob-finish-icon">🎉</div>
      <h2 class="ob-title" style="text-align:center;margin-bottom:8px">You're all set!</h2>
      <p class="ob-desc" style="text-align:center;margin-bottom:24px">The hub is yours. Dive in whenever you're ready — here are the sections most relevant to you.</p>
      <div class="ob-finish-grid">
        <a class="ob-finish-link" href="index.html"><span class="ob-finish-link-icon">🏠</span><span>Home & Noticeboard</span></a>
        <a class="ob-finish-link" href="index.html#text-templates" onclick="sessionStorage.setItem('kmc-pending-section','text-templates')"><span class="ob-finish-link-icon">💬</span><span>Text Templates</span></a>
        <a class="ob-finish-link" href="index.html#care-pathways" onclick="sessionStorage.setItem('kmc-pending-section','care-pathways')"><span class="ob-finish-link-icon">🏥</span><span>Patient Journeys</span></a>
        <a class="ob-finish-link" href="index.html#cdm" onclick="sessionStorage.setItem('kmc-pending-section','cdm')"><span class="ob-finish-link-icon">🔁</span><span>CDM</span></a>
      </div>
      <div style="text-align:center;margin-top:8px">
        <a href="index.html" class="ob-btn ob-btn-primary" style="display:inline-block;text-decoration:none;padding:12px 32px;border-radius:8px;font-size:0.95rem">Go to the Staff Hub →</a>
      </div>
    </div>
  `;
}

function obNav(dir) {
  stepIndex = Math.max(0, Math.min(steps.length - 1, stepIndex + dir));
  renderStep();
}

// ── INIT ─────────────────────────────────────────────────────
renderRolePicker();
</script>
</body>
</html>
